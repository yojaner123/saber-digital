<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Escolar - Sistema Avanzado de Gestión</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { 
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .card-header-gradient { 
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            color: white; 
        }
        .btn-hover-effect {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-hover-effect:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .table-responsive {
            border-radius: 0.5rem;
            overflow: hidden;
        }
        .stat-card {
            border-radius: 0.75rem;
            border-left: 4px solid;
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-3px);
        }
        .stat-card.primary { border-left-color: #0d6efd; }
        .stat-card.success { border-left-color: #198754; }
        .stat-card.warning { border-left-color: #ffc107; }
        .stat-card.info { border-left-color: #0dcaf0; }
        
        /* Theme toggle switch styles */
        .theme-switch-wrapper {
            display: flex;
            align-items: center;
        }
        .theme-switch {
            display: inline-block;
            height: 34px;
            position: relative;
            width: 60px;
        }
        .theme-switch input { display: none; }
        .slider {
            background-color: #ccc;
            bottom: 0; cursor: pointer; left: 0; position: absolute; right: 0; top: 0;
            transition: .4s; border-radius: 34px;
        }
        .slider:before {
            background-color: #fff; bottom: 4px; content: ""; height: 26px; left: 4px;
            position: absolute; transition: .4s; width: 26px; border-radius: 50%;
        }
        input:checked + .slider { background-color: #2c3e50; }
        input:checked + .slider:before { transform: translateX(26px); background-color: #f1c40f; }
    </style>
</head>
<body>
    <!-- Navbar / Header -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow-sm" aria-label="Navegación principal">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-book-half me-2" aria-hidden="true"></i>Saber Digital
            </a>
            <div class="d-flex align-items-center gap-3">
                <span id="theme-icon-light" aria-hidden="true" class="text-white"><i class="bi bi-sun-fill"></i></span>
                <label class="theme-switch" for="checkbox" aria-label="Alternar tema oscuro y claro">
                    <input type="checkbox" id="checkbox" />
                    <div class="slider"></div>
                </label>
                <span id="theme-icon-dark" aria-hidden="true" class="text-white"><i class="bi bi-moon-stars-fill"></i></span>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="card shadow border-0 rounded-3 mb-4">
            <div class="card-header card-header-gradient py-3 d-flex justify-content-between align-items-center">
                <h2 class="mb-0 fs-4"><i class="bi bi-collection"></i> Catálogo de Libros</h2>
            </div>
            <div class="card-body p-4">
                <div class="d-flex flex-wrap gap-2 mb-4" role="toolbar" aria-label="Acciones principales">
                    <button class="btn btn-primary btn-hover-effect shadow-sm" data-bs-toggle="modal" data-bs-target="#modalLibro" aria-label="Agregar libro">
                        <i class="bi bi-plus-lg me-1" aria-hidden="true"></i> Agregar Libro
                    </button>
                    <button class="btn btn-info text-white btn-hover-effect shadow-sm" onclick="abrirDashboard()" aria-label="Ver Dashboard">
                        <i class="bi bi-pie-chart-fill me-1" aria-hidden="true"></i> Estadísticas y Reportes
                    </button>
                </div>
                
                <div class="table-responsive shadow-sm border">
                    <table class="table table-striped table-hover mb-0" id="tablaLibros" aria-label="Lista de libros">
                        <thead class="table-dark">
                            <tr>
                                <th scope="col">ID</th>
                                <th scope="col">Título</th>
                                <th scope="col">Autor</th>
                                <th scope="col">Categoría</th>
                                <th scope="col">Año</th>
                                <th scope="col">Lecturas</th>
                                <th scope="col">Estado</th>
                                <th scope="col">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoTabla"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal para Agregar Libro -->
    <div class="modal fade" id="modalLibro" tabindex="-1" aria-labelledby="modalLibroLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalLibroLabel">
                        <i class="bi bi-journal-plus me-2" aria-hidden="true"></i>Nuevo Libro
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="formLibro">
                        <div class="mb-3">
                            <label for="titulo" class="form-label fw-bold">Título</label>
                            <input type="text" class="form-control" id="titulo" required>
                        </div>
                        <div class="mb-3">
                            <label for="autor" class="form-label fw-bold">Autor</label>
                            <input type="text" class="form-control" id="autor" required>
                        </div>
                        <div class="mb-3">
                            <label for="categoria" class="form-label fw-bold">Categoría</label>
                            <select class="form-select" id="categoria" required>
                                <option value="" disabled selected>Selecciona...</option>
                                <option value="Ficción">Ficción</option>
                                <option value="No ficción">No ficción</option>
                                <option value="Ciencia">Ciencia</option>
                                <option value="Historia">Historia</option>
                                <option value="Literatura">Literatura</option>
                                <option value="Fantasía">Fantasía</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="anio" class="form-label fw-bold">Año</label>
                            <input type="number" class="form-control" id="anio" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="agregarLibro()">Guardar Libro</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para Editar Libro -->
    <div class="modal fade" id="modalEditarLibro" tabindex="-1" aria-labelledby="modalEditarLibroLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-warning">
                    <h5 class="modal-title text-dark" id="modalEditarLibroLabel">
                        <i class="bi bi-pencil-square me-2" aria-hidden="true"></i>Editar Libro
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="formEditarLibro">
                        <div class="mb-3">
                            <label for="edit_titulo" class="form-label fw-bold">Título</label>
                            <input type="text" class="form-control" id="edit_titulo" required>
                        </div>
                        <div class="mb-3">
                            <label for="edit_autor" class="form-label fw-bold">Autor</label>
                            <input type="text" class="form-control" id="edit_autor" required>
                        </div>
                        <div class="mb-3">
                            <label for="edit_categoria" class="form-label fw-bold">Categoría</label>
                            <select class="form-select" id="edit_categoria" required>
                                <option value="Ficción">Ficción</option>
                                <option value="No ficción">No ficción</option>
                                <option value="Ciencia">Ciencia</option>
                                <option value="Historia">Historia</option>
                                <option value="Literatura">Literatura</option>
                                <option value="Fantasía">Fantasía</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="edit_anio" class="form-label fw-bold">Año</label>
                            <input type="number" class="form-control" id="edit_anio" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-warning text-dark fw-bold" onclick="guardarEdicion()">Actualizar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Dashboard Estadísticas -->
    <div class="modal fade" id="modalDashboard" tabindex="-1" aria-labelledby="modalDashboardLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-info text-white">
                    <h5 class="modal-title" id="modalDashboardLabel">
                        <i class="bi bi-bar-chart-fill me-2" aria-hidden="true"></i>Dashboard de Biblioteca
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body p-4 bg-light">
                    
                    <!-- Tarjetas de Resumen -->
                    <div class="row g-3 mb-4">
                        <div class="col-md-3 col-sm-6">
                            <div class="card stat-card primary h-100 shadow-sm border-0">
                                <div class="card-body">
                                    <h6 class="text-muted text-uppercase mb-2">Total de Libros</h6>
                                    <h3 class="mb-0 text-primary fw-bold" id="stat_total">0</h3>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3 col-sm-6">
                            <div class="card stat-card success h-100 shadow-sm border-0">
                                <div class="card-body">
                                    <h6 class="text-muted text-uppercase mb-2">Disponibles</h6>
                                    <h3 class="mb-0 text-success fw-bold" id="stat_disponibles">0</h3>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3 col-sm-6">
                            <div class="card stat-card warning h-100 shadow-sm border-0">
                                <div class="card-body">
                                    <h6 class="text-muted text-uppercase mb-2">En Préstamo</h6>
                                    <h3 class="mb-0 text-warning fw-bold" id="stat_prestados">0</h3>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3 col-sm-6">
                            <div class="card stat-card info h-100 shadow-sm border-0">
                                <div class="card-body">
                                    <h6 class="text-muted text-uppercase mb-2">Lecturas Totales</h6>
                                    <h3 class="mb-0 text-info fw-bold" id="stat_lecturas">0</h3>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row g-4">
                        <div class="col-md-6">
                            <div class="card shadow-sm border-0 h-100">
                                <div class="card-header bg-white">
                                    <h6 class="mb-0 fw-bold"><i class="bi bi-pie-chart"></i> Libros por Categoría</h6>
                                </div>
                                <div class="card-body" id="listaCategorias">
                                    <!-- Barras generadas por JS -->
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card shadow-sm border-0 h-100">
                                <div class="card-header bg-white">
                                    <h6 class="mb-0 fw-bold"><i class="bi bi-trophy"></i> Top 5 Más Leídos</h6>
                                </div>
                                <div class="card-body d-flex flex-column gap-2" id="listaTopLeidos">
                                    <!-- Lista generada por JS -->
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
                <div class="modal-footer bg-white">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar Dashboard</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="solucion_semana12.js"></script>
</body>
</html>
